# 1. Oracle Connection Details
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/FREEPDB1
spring.datasource.username=SYSTEM
spring.datasource.password=SWAMY
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# 2. Hibernate/JPA Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect

# 3. Server Port
server.port=8080

# 4. FIX: File Upload Limits (Prevents errors with large PDFs/DOCX)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 5. FIX: Disable Default Security (Bypasses the "Connection Error" block)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# 6. Oracle Specific Optimization
spring.datasource.hikari.maximum-pool-size=5

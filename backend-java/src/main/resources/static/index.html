<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVU AI Career Navigator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; padding: 40px; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        h2 { color: #1a73e8; text-align: center; margin-top: 0; }
        .sub-text { text-align: center; color: #5f6368; margin-bottom: 30px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 20px; background-color: #1a73e8; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #1557b0; }
        button:disabled { background-color: #ccc; }
        .ats-box { margin-top: 30px; padding: 20px; border-radius: 10px; display: none; border: 1px solid #ddd; }
        .progress-container { background-color: #e0e0e0; border-radius: 20px; height: 20px; width: 100%; margin: 15px 0; }
        .progress-bar { background-color: #27ae60; height: 100%; border-radius: 20px; width: 0%; transition: width 1s ease-in-out; }
        .missing-skills { background-color: #fff3cd; color: #856404; padding: 15px; border-radius: 5px; margin-top: 15px; border-left: 5px solid #ffc107; }
        .skills-found { color: #155724; background-color: #d4edda; padding: 10px; border-radius: 5px; margin-top: 10px; }
        .loading { color: #1a73e8; font-weight: bold; display: none; text-align: center; margin-top: 20px; }
    </style>

    <script>
        // 1. Immediate Load Check
        window.onload = function() {
            console.log("✅ SVU AI Navigator UI Loaded and Ready.");
        };

        async function analyzeResume() {
            console.log("🚀 Analysis Started...");
            const fileInput = document.getElementById('resumeFile');
            const interestInput = document.getElementById('interest');
            const resultDiv = document.getElementById('result');
            const loadingDiv = document.getElementById('loading');
            const btn = document.getElementById('analyzeBtn');

            // Validation
            if (!fileInput.files[0] || !interestInput.value) {
                alert("Please provide both Job Role and Resume file!");
                return;
            }

            // UI State Change
            loadingDiv.style.display = 'block';
            resultDiv.style.display = 'none';
            btn.disabled = true;

            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            formData.append("interest", interestInput.value);

            try {
                // Use absolute path to bypass potential routing issues
                const response = await fetch('http://localhost:8080/api/candidates/analyze-resume', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error("Server Error: Check Spring Boot Logs");

                const data = await response.json();
                console.log("📊 Data Received:", data);

                loadingDiv.style.display = 'none';
                resultDiv.style.display = 'block';
                btn.disabled = false;

                // Update ATS Results
                document.getElementById('scoreText').innerText = `ATS Score: ${data.ats_score}%`;
                document.getElementById('scoreBar').style.width = `${data.ats_score}%`;
                
                const foundSkills = data.skills_found || [];
                document.getElementById('foundBox').innerHTML = `<b>✅ Skills Found:</b> ${foundSkills.join(', ') || 'No specific matches'}`;
                
                const missingBox = document.getElementById('missingBox');
                const missingSkills = data.missing_skills || [];
                if (missingSkills.length > 0) {
                    missingBox.style.display = 'block';
                    missingBox.innerHTML = `<b>⚠️ Missing from Resume:</b> ${missingSkills.join(', ')}`;
                } else {
                    missingBox.style.display = 'none';
                }
                
                document.getElementById('statusMsg').innerText = data.message || "ML Analysis Complete";

            } catch (error) {
                console.error("❌ Connection Error:", error);
                loadingDiv.style.display = 'none';
                btn.disabled = false;
                alert("Connection Error! Ensure Python (5000) and Java (8080) are both running.");
            }
        }
    </script>
</head>
<body>

<div class="container">
    <h2>🎓 AI Resume & Career Analyzer</h2>
    <p class="sub-text">Dataset-Driven Placement Recommender</p>
    
    <label><b>Job Role / Interests:</b></label>
    <input type="text" id="interest" placeholder="e.g. Web Developer, Java Developer">
    
    <label><b>Upload Resume:</b></label>
    <input type="file" id="resumeFile" accept=".pdf,.docx">
    
    <button id="analyzeBtn" onclick="analyzeResume()">Analyze My Resume</button>

    <div id="loading" class="loading">⚙️ AI Engine is comparing with industry dataset...</div>

    <div id="result" class="ats-box">
        <h3 id="scoreText" style="text-align: center; margin-bottom: 5px;"></h3>
        <div class="progress-container">
            <div id="scoreBar" class="progress-bar"></div>
        </div>
        
        <div id="foundBox" class="skills-found"></div>
        <div id="missingBox" class="missing-skills"></div>
        <p id="statusMsg" style="font-weight: bold; margin-top: 15px; text-align: center;"></p>
    </div>
</div>

</body>
</html>
